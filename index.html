<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropIQ • Fortnite Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --purple-1: #6b21a8;
            --purple-2: #7e22ce;
            --purple-3: #a855f7;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(168 85 247 / 0.25);
        }

        .leaderboard-row {
            transition: all 0.2s ease;
        }
        
        .leaderboard-row:hover {
            background-color: rgba(168, 85, 247, 0.1) !important;
        }

        .purple-glow {
            box-shadow: 0 0 35px -5px rgb(168 85 247);
        }
    </style>
</head>
<body class="bg-[#0a0618] text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-x-4">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-violet-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner">
                    💧
                </div>
                <div>
                    <h1 class="title-font text-5xl font-semibold tracking-tighter">DropIQ</h1>
                    <p class="text-purple-400 text-sm -mt-1">Fortnite Tournament Intelligence</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-6 text-sm">
                <div onclick="fetchEvents()" class="flex items-center gap-x-2 px-5 py-2.5 bg-white/5 hover:bg-white/10 rounded-3xl cursor-pointer transition-colors">
                    <i class="fas fa-sync-alt"></i>
                    <span>Refresh Events</span>
                </div>
                <div class="px-4 py-2 bg-white/5 rounded-3xl flex items-center gap-x-2 text-purple-300">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    LIVE
                </div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-6">
            <!-- Sidebar Controls -->
            <div class="col-span-12 lg:col-span-4 space-y-6">
                <!-- Tournament Selector -->
                <div class="glass border border-purple-500/30 rounded-3xl p-6">
                    <h2 class="text-xl font-semibold mb-4 flex items-center gap-x-3">
                        <i class="fas fa-trophy text-purple-400"></i>
                        SELECT TOURNAMENT
                    </h2>
                    
                    <div class="relative mb-6">
                        <select id="tournamentSelect" 
                                onchange="loadTournamentData()"
                                class="w-full bg-[#1a1428] border border-purple-500/40 focus:border-purple-400 rounded-2xl px-5 py-4 text-white appearance-none focus:outline-none cursor-pointer">
                            <option value="">Loading tournaments...</option>
                        </select>
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-purple-400">
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>

                    <div id="eventInfo" class="hidden bg-[#1a1428] rounded-2xl p-5 text-sm space-y-3">
                    </div>
                </div>

                <!-- Stats Card -->
                <div class="glass border border-purple-500/30 rounded-3xl p-6">
                    <h2 class="text-xl font-semibold mb-5 flex items-center gap-x-3">
                        <i class="fas fa-chart-bar text-purple-400"></i>
                        QUALIFICATION ESTIMATE
                    </h2>
                    
                    <div id="qualifyStats" class="space-y-6">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- API Status -->
                <div class="glass border border-purple-500/20 rounded-3xl p-5 text-xs text-purple-400/70 flex items-center justify-between">
                    <div>Powered by api-fortnite.com</div>
                    <div class="flex items-center gap-x-1">
                        <span class="text-emerald-400">●</span>
                        CONNECTED
                    </div>
                </div>
            </div>

            <!-- Main Leaderboard -->
            <div class="col-span-12 lg:col-span-8">
                <div class="glass border border-purple-500/30 rounded-3xl overflow-hidden">
                    <!-- Leaderboard Header -->
                    <div class="bg-gradient-to-r from-purple-600 to-violet-600 px-8 py-6 flex items-center justify-between">
                        <div>
                            <h2 id="leaderboardTitle" class="text-2xl font-semibold title-font">Global Leaderboard</h2>
                            <p id="leaderboardSubtitle" class="text-purple-200 text-sm">Loading...</p>
                        </div>
                        <div class="text-right">
                            <div id="totalPlayers" class="text-3xl font-mono font-bold">0</div>
                            <div class="text-xs uppercase tracking-widest text-purple-200">PLAYERS</div>
                        </div>
                    </div>

                    <!-- Leaderboard Table -->
                    <div class="overflow-auto max-h-[650px]" id="leaderboardContainer">
                        <table class="w-full">
                            <thead class="sticky top-0 bg-[#1a1428] border-b border-purple-500/30">
                                <tr class="text-purple-300 text-xs uppercase tracking-widest">
                                    <th class="px-8 py-5 text-left w-16">#</th>
                                    <th class="px-4 py-5 text-left">PLAYER</th>
                                    <th class="px-4 py-5 text-center">POINTS</th>
                                    <th class="px-4 py-5 text-center">WINS</th>
                                    <th class="px-4 py-5 text-center">ELIMINATIONS</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboardBody" class="divide-y divide-purple-500/10 text-sm">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center text-purple-500/40 text-xs flex items-center justify-center gap-x-8">
            <div>DropIQ • Unofficial Fortnite Tool</div>
            <div class="flex items-center gap-x-5">
                <a href="https://www.api-fortnite.com" target="_blank" class="hover:text-purple-400 transition-colors">API</a>
                <span>•</span>
                <span>Made for Dustie</span>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "f1758950fe4aaf77a7741f5deb3e7a6687f48a2d12ed029a41e3f18adb46f759";
        const BASE_URL = "https://prod.api-fortnite.com";
        
        let currentEvents = [];
        let currentLeaderboard = [];

        function createHeaders() {
            return {
                "x-api-key": API_KEY,
                "Content-Type": "application/json"
            };
        }

        async function fetchEvents() {
            const select = document.getElementById("tournamentSelect");
            select.innerHTML = `<option value="">Loading tournaments...</option>`;
            
            try {
                // Try multiple possible endpoints
                let response = await fetch(`${BASE_URL}/api/v1/events/global`, {
                    headers: createHeaders()
                });
                
                if (!response.ok) {
                    response = await fetch(`${BASE_URL}/api/v1/events`, {
                        headers: createHeaders()
                    });
                }
                
                if (response.ok) {
                    const data = await response.json();
                    currentEvents = Array.isArray(data) ? data : (data.events || data.data || []);
                    
                    select.innerHTML = `<option value="">Choose a tournament...</option>`;
                    
                    currentEvents.forEach(event => {
                        const option = document.createElement("option");
                        option.value = event.id || event.eventId || event.windowId || "";
                        option.textContent = event.name || event.title || `Event ${option.value.substring(0, 12)}...`;
                        select.appendChild(option);
                    });
                    
                    if (currentEvents.length > 0) {
                        select.value = currentEvents[0].id || currentEvents[0].eventId || "";
                        loadTournamentData();
                    }
                } else {
                    throw new Error("Failed to fetch");
                }
            } catch(e) {
                console.error(e);
                select.innerHTML = `<option value="">Failed to load. Check API key.</option>`;
            }
        }

        async function loadTournamentData() {
            const select = document.getElementById("tournamentSelect");
            const eventId = select.value;
            
            if (!eventId) return;
            
            const event = currentEvents.find(e => (e.id || e.eventId) === eventId);
            if (!event) return;
            
            // Update event info
            const infoDiv = document.getElementById("eventInfo");
            infoDiv.classList.remove("hidden");
            infoDiv.innerHTML = `
                <div class="flex justify-between text-sm">
                    <span class="text-purple-400">Event ID</span>
                    <span class="font-mono">${eventId.substring(0, 18)}${eventId.length > 18 ? '...' : ''}</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-purple-400">Window</span>
                    <span>${event.windowId || 'Current'}</span>
                </div>
            `;
            
            document.getElementById("leaderboardTitle").textContent = event.name || "Tournament Leaderboard";
            document.getElementById("leaderboardSubtitle").textContent = "Real-time standings";
            
            try {
                // Fetch leaderboard
                let lbUrl = `${BASE_URL}/api/v1/events/global/leaderboard`;
                
                const lbResponse = await fetch(lbUrl, {
                    headers: createHeaders()
                });
                
                if (lbResponse.ok) {
                    const lbData = await lbResponse.json();
                    currentLeaderboard = lbData.leaderboard || lbData.entries || lbData || [];
                    renderLeaderboard();
                    calculateQualifyStats();
                }
            } catch(e) {
                console.error("Leaderboard fetch failed", e);
                // Mock data for demo
                currentLeaderboard = generateMockLeaderboard();
                renderLeaderboard();
                calculateQualifyStats();
            }
        }

        function generateMockLeaderboard() {
            const names = ["Ninja", "Bugha", "Tfue", "Clix", "Mongraal", "Aqua", "Rezon", "UnknownxArmy", "Zayt", "Chap"];
            return Array(25).fill(0).map((_, i) => ({
                rank: i + 1,
                name: names[i % names.length] + (i > 5 ? `${Math.floor(Math.random()*99)}` : ""),
                points: Math.floor(250 - (i * 8) + Math.random() * 15),
                wins: Math.max(0, Math.floor(12 - i / 3)),
                elims: Math.floor(45 - i * 1.2 + Math.random() * 20)
            }));
        }

        function renderLeaderboard() {
            const tbody = document.getElementById("leaderboardBody");
            tbody.innerHTML = "";
            
            document.getElementById("totalPlayers").textContent = currentLeaderboard.length;
            
            currentLeaderboard.slice(0, 50).forEach(player => {
                const row = document.createElement("tr");
                row.className = "leaderboard-row border-b border-purple-500/10 hover:bg-purple-500/5";
                row.innerHTML = `
                    <td class="px-8 py-5 font-mono text-purple-300">${player.rank || player.position || "?"}</td>
                    <td class="px-4 py-5 font-medium">${player.name || player.displayName || "Player"}</td>
                    <td class="px-4 py-5 text-center font-bold text-purple-300">${player.points || player.score || 0}</td>
                    <td class="px-4 py-5 text-center">${player.wins || 0}</td>
                    <td class="px-4 py-5 text-center">${player.elims || player.kills || 0}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function calculateQualifyStats() {
            const container = document.getElementById("qualifyStats");
            
            if (currentLeaderboard.length === 0) {
                container.innerHTML = `<div class="text-purple-400 text-center py-8">No data available yet</div>`;
                return;
            }
            
            // Sort by points descending
            const sorted = [...currentLeaderboard].sort((a, b) => {
                return (b.points || b.score || 0) - (a.points || a.score || 0);
            });
            
            // Top 10 average
            const top10 = sorted.slice(0, 10);
            const top10Avg = Math.round(top10.reduce((sum, p) => sum + (p.points || p.score || 0), 0) / top10.length);
            
            // Top 50 average
            const top50 = sorted.slice(0, 50);
            const top50Avg = Math.round(top50.reduce((sum, p) => sum + (p.points || p.score || 0), 0) / top50.length);
            
            // Estimated qualify threshold (approx 150th place or average of 100-200)
            let qualifyEstimate = Math.max(85, Math.round(top50Avg * 0.72));
            
            container.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-[#120d1f] rounded-2xl p-5">
                        <div class="uppercase text-[10px] tracking-[1px] text-purple-400 mb-1">TOP 10 AVG</div>
                        <div class="text-4xl font-mono font-bold text-white">${top10Avg}</div>
                        <div class="text-emerald-400 text-xs mt-1">points</div>
                    </div>
                    <div class="bg-[#120d1f] rounded-2xl p-5">
                        <div class="uppercase text-[10px] tracking-[1px] text-purple-400 mb-1">TOP 50 AVG</div>
                        <div class="text-4xl font-mono font-bold text-white">${top50Avg}</div>
                        <div class="text-emerald-400 text-xs mt-1">points</div>
                    </div>
                </div>
                
                <div class="mt-6 pt-6 border-t border-purple-500/20">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <div class="text-purple-300 text-sm">ESTIMATED TO QUALIFY</div>
                            <div class="text-6xl font-mono font-bold text-violet-300 leading-none">${qualifyEstimate}</div>
                        </div>
                        <div class="text-right">
                            <div class="px-4 py-2 bg-violet-600/20 text-violet-300 text-xs rounded-2xl inline-block">~ TOP 150</div>
                        </div>
                    </div>
                    <div class="h-2 bg-purple-900 rounded-full overflow-hidden">
                        <div class="h-2 bg-gradient-to-r from-purple-400 to-violet-500 w-[68%] rounded-full"></div>
                    </div>
                    <div class="flex justify-between text-[10px] text-purple-400 mt-1">
                        <span>0</span>
                        <span>QUALIFY</span>
                    </div>
                </div>
                
                <div onclick="alert('DropIQ predicts you need around ' + ${qualifyEstimate} + ' points to make it to the next round. Good luck!')" 
                     class="mt-8 cursor-pointer text-center py-4 bg-gradient-to-r from-purple-500 to-violet-500 hover:from-purple-600 hover:to-violet-600 rounded-2xl font-medium transition-all active:scale-95">
                    HOW DO I REACH THIS?
                </div>
            `;
        }

        // Tailwind script
        function initTailwind() {
            // Already included via CDN
        }

        // Keyboard shortcuts
        document.addEventListener("keydown", function(e) {
            if (e.metaKey && e.key === "k") {
                e.preventDefault();
                document.getElementById("tournamentSelect").focus();
            }
        });

        // Boot the app
        window.onload = function() {
            fetchEvents();
            
            // Demo data fallback if API fails
            setTimeout(() => {
                if (currentLeaderboard.length === 0) {
                    currentLeaderboard = generateMockLeaderboard();
                    renderLeaderboard();
                    calculateQualifyStats();
                }
            }, 1800);
        };
    </script>
</body>
</html>
