<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Shop • Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .shop-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); }
        
        .card {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -15px rgb(0 0 0 / 0.5);
        }
        .item-img { transition: transform 0.4s ease; }
        .card:hover .item-img { transform: scale(1.08); }
        
        .tab-active {
            border-bottom: 3px solid #22d3ee;
            color: white;
        }
    </style>
</head>
<body class="shop-bg text-white min-h-screen">

<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Header -->
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 pb-8 border-b border-white/10">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-3xl flex items-center justify-center text-4xl shadow-lg">
                🎮
            </div>
            <div>
                <h1 class="text-5xl font-bold tracking-tighter">FORTNITE SHOP</h1>
                <p class="text-emerald-400 flex items-center gap-2 text-sm">
                    <span class="w-2.5 h-2.5 bg-emerald-400 rounded-full animate-pulse"></span>
                    LIVE • Daily Reset at 00:00 UTC
                </p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <input id="search" 
                   type="text" 
                   placeholder="Search items..." 
                   onkeyup="filterItems()"
                   class="bg-zinc-900 border border-white/20 rounded-2xl px-5 py-3 w-80 focus:outline-none focus:border-cyan-400">

            <button onclick="refreshShop()" 
                    class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-6 py-3 rounded-2xl transition">
                <i class="fas fa-sync"></i>
                <span>Refresh</span>
            </button>
        </div>
    </header>

    <div id="loading" class="flex flex-col items-center justify-center py-32">
        <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <p class="text-xl text-white/70">Loading today's shop...</p>
    </div>

    <div id="shop-content" class="hidden">

        <!-- Tabs -->
        <div class="flex gap-8 border-b border-white/10 mb-10 overflow-x-auto pb-1">
            <button onclick="switchTab(0)" class="tab tab-active px-6 py-3 text-lg font-medium whitespace-nowrap" id="tab-0">All Items</button>
            <button onclick="switchTab(1)" class="tab px-6 py-3 text-lg font-medium whitespace-nowrap" id="tab-1">Skins</button>
            <button onclick="switchTab(2)" class="tab px-6 py-3 text-lg font-medium whitespace-nowrap" id="tab-2">Emotes</button>
            <button onclick="switchTab(3)" class="tab px-6 py-3 text-lg font-medium whitespace-nowrap" id="tab-3">Wraps</button>
            <button onclick="switchTab(4)" class="tab px-6 py-3 text-lg font-medium whitespace-nowrap" id="tab-4">Jam Tracks</button>
            <button onclick="switchTab(5)" class="tab px-6 py-3 text-lg font-medium whitespace-nowrap" id="tab-5">Other</button>
        </div>

        <!-- Featured -->
        <div id="featured" class="mb-16"></div>

        <!-- Grid -->
        <div id="items-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-6">
            <!-- JS populated -->
        </div>
    </div>
</div>

<footer class="text-center text-white/40 text-sm py-12 border-t border-white/10 mt-20">
    Data from fortnite-api.com • Built with ❤️ for Fortnite players
</footer>

<script>
    let shopData = null;
    let currentTab = 0;

    async function fetchShop() {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('shop-content').classList.add('hidden');

        try {
            const res = await fetch('https://fortnite-api.com/v2/shop');
            const data = await res.json();
            
            if (data.status === 200) {
                shopData = data.data;
                renderShop();
            }
        } catch (err) {
            console.error(err);
            alert("Could not load the shop. Please try again later.");
        } finally {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('shop-content').classList.remove('hidden');
        }
    }

    function getRarityColor(rarity) {
        const map = { legendary: '#f59e0b', epic: '#c026d3', rare: '#3b82f6', uncommon: '#22c55e', common: '#94a3b8' };
        return map[rarity?.toLowerCase()] || '#64748b';
    }

    function categorizeItem(entry) {
        const item = entry.brItems?.[0] || entry.tracks?.[0] || {};
        const type = item.type?.displayValue?.toLowerCase() || '';
        
        if (entry.tracks?.length) return 'Jam Tracks';
        if (type.includes('outfit') || type.includes('skin')) return 'Skins';
        if (type.includes('emote')) return 'Emotes';
        if (type.includes('wrap')) return 'Wraps';
        return 'Other';
    }

    function renderShop() {
        const entries = shopData.entries || [];
        
        // Featured (first 4 items)
        renderFeatured(entries.slice(0, 4));

        // Render all items
        renderItems(entries);
    }

    function renderFeatured(featured) {
        let html = `
            <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">
                <i class="fas fa-star text-yellow-400"></i> Featured Today
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        `;

        featured.forEach(entry => {
            const item = entry.brItems?.[0] || entry.tracks?.[0] || {};
            const price = entry.finalPrice || entry.regularPrice;
            const name = item.name || 'Unknown Item';
            const image = item.images?.featured || item.images?.icon || 'https://via.placeholder.com/400';
            const rarity = item.rarity?.value || 'common';

            html += `
                <div class="card bg-zinc-900/80 border border-white/10 rounded-3xl overflow-hidden">
                    <img src="${image}" class="w-full h-80 object-cover item-img" alt="${name}">
                    <div class="p-5">
                        <h3 class="font-semibold text-lg leading-tight mb-1">${name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-cyan-400 font-bold">$${price}</span>
                            <span class="text-xs uppercase tracking-widest" style="color:${getRarityColor(rarity)}">
                                ${rarity}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        });

        html += `</div>`;
        document.getElementById('featured').innerHTML = html;
    }

    function renderItems(entries) {
        const grid = document.getElementById('items-grid');
        grid.innerHTML = '';

        entries.forEach(entry => {
            const item = entry.brItems?.[0] || entry.tracks?.[0] || {};
            const price = entry.finalPrice || entry.regularPrice;
            const name = item.name || entry.devName?.replace('[VIRTUAL]1 x ', '') || 'Item';
            const image = item.images?.icon || item.images?.smallIcon || 'https://picsum.photos/300';
            const rarity = (item.rarity?.value || 'common').toLowerCase();
            const category = categorizeItem(entry);

            const card = `
                <div class="card bg-zinc-900/80 border border-white/10 rounded-3xl overflow-hidden group" data-category="${category}" data-name="${name.toLowerCase()}">
                    <div class="relative">
                        <img src="${image}" class="w-full aspect-square object-cover item-img" alt="${name}">
                        <div class="absolute top-3 right-3 bg-black/80 px-3 py-1 rounded-2xl text-sm font-bold flex items-center gap-1">
                            <img src="https://fortnite-api.com/images/vbuck.png" class="w-4 h-4" alt="V-Bucks">
                            <span>${price}</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-medium leading-tight mb-2 line-clamp-2">${name}</h3>
                        <div class="flex justify-between text-xs">
                            <span class="text-white/60">${category}</span>
                            <span class="px-3 py-1 rounded-full" style="background-color: ${getRarityColor(rarity)}20; color: ${getRarityColor(rarity)}">
                                ${rarity.toUpperCase()}
                            </span>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    function switchTab(tabIndex) {
        currentTab = tabIndex;
        
        document.querySelectorAll('.tab').forEach((tab, i) => {
            tab.classList.toggle('tab-active', i === tabIndex);
        });

        filterItems();
    }

    function filterItems() {
        const searchTerm = document.getElementById('search').value.toLowerCase();
        const cards = document.querySelectorAll('#items-grid > div');

        cards.forEach(card => {
            const name = card.dataset.name;
            const category = card.dataset.category;
            
            let show = true;

            if (currentTab !== 0) {
                const tabNames = ['All', 'Skins', 'Emotes', 'Wraps', 'Jam Tracks', 'Other'];
                show = category === tabNames[currentTab];
            }

            if (searchTerm && !name.includes(searchTerm)) {
                show = false;
            }

            card.style.display = show ? 'block' : 'none';
        });
    }

    async function refreshShop() {
        await fetchShop();
    }

    // Auto refresh every 5 minutes
    setInterval(() => { if (shopData) fetchShop(); }, 300000);

    window.onload = fetchShop;
</script>
</body>
</html>
