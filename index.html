<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORTNITE TOURNAMENTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --neon-purple: #a855f7;
            --neon-cyan: #22d3ee;
        }
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0033 100%);
            color: white;
            overflow-x: hidden;
        }
        
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(255, 255, 255, 0.03) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 4s linear infinite;
            z-index: 1;
        }
        
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        .card {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 0 30px -10px var(--neon-purple);
        }
        
        .card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 0 60px -5px var(--neon-purple);
        }
        
        .glow-text {
            text-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-purple);
        }
        
        .countdown {
            font-variant-numeric: tabular-nums;
            letter-spacing: 4px;
        }
        
        .logo {
            animation: logoPulse 2s infinite alternate;
        }
        
        @keyframes logoPulse {
            from { text-shadow: 0 0 20px #a855f7; }
            to { text-shadow: 0 0 60px #22d3ee; }
        }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="scanline"></div>
    
    <!-- Hero -->
    <div class="relative pt-16 pb-12 text-center border-b border-purple-500/30">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,#6b21a8_0%,transparent_70%)] opacity-40"></div>
        
        <div class="relative z-10 max-w-4xl mx-auto px-6">
            <h1 class="text-7xl font-bold tracking-widest logo mb-2 flex items-center justify-center gap-4">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400">FN</span>
                <span class="text-white">EVENTS</span>
            </h1>
            <p class="text-cyan-400 text-xl tracking-[6px] uppercase">Future Tournaments • Live Countdowns</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 pt-12">
        <div id="events-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Events populated by JS -->
        </div>
        
        <div id="loading" class="text-center py-20">
            <div class="inline-flex items-center gap-3 text-purple-400">
                <i class="fa-solid fa-spinner fa-spin text-3xl"></i>
                <span class="text-xl tracking-widest">CONNECTING TO FORTNITE...</span>
            </div>
        </div>
        
        <div id="error" class="hidden text-center py-20 text-red-400">
            <i class="fa-solid fa-exclamation-triangle text-5xl mb-4"></i>
            <p class="text-xl">Failed to load events. Check console for details.</p>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-black/80 border-t border-purple-500/30 py-4 text-center text-xs text-purple-300/70 tracking-widest">
        POWERED BY PROD.API-FORTNITE.COM • BUILT WITH NEON ENERGY
    </footer>

    <script>
        const API_KEY = "a9d597b6a979d4293b70f23c8e6f28d3fbc3f948152b2b525382f1bb0ab2a8e5";
        const BASE_URL = "https://prod.api-fortnite.com";
        
        async function fetchEvents() {
            try {
                // Try several likely endpoints based on the screenshot
                const endpoints = [
                    '/api/v1/events/global',
                    '/api/v1/events',
                    '/api/v1/events/sessions',
                    '/api/v1/events/cashprizes'
                ];
                
                for (const endpoint of endpoints) {
                    const res = await fetch(`${BASE_URL}${endpoint}`, {
                        headers: {
                            'x-api-key': API_KEY,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        console.log(`✅ Data from ${endpoint}:`, data);
                        return data;
                    }
                }
                
                throw new Error("No endpoint returned data");
            } catch (err) {
                console.error("API Error:", err);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
                return null;
            }
        }
        
        function formatCountdown(targetDate) {
            const now = new Date().getTime();
            const distance = new Date(targetDate).getTime() - now;
            
            if (distance < 0) return "LIVE NOW";
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            
            return `${days}d ${hours}h ${minutes}m`;
        }
        
        function createEventCard(event) {
            // Adapt this to your actual response structure
            const title = event.name || event.eventName || event.title || "Fortnite Tournament";
            const startTime = event.startTime || event.beginTime || event.windowStart || new Date(Date.now() + 86400000).toISOString();
            const prize = event.prize || event.totalPrize || "TBD";
            const mode = event.gameMode || event.mode || "BR";
            
            const card = document.createElement('div');
            card.className = `card bg-zinc-950 border border-purple-500/30 rounded-xl overflow-hidden p-6 group`;
            
            card.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="inline-block px-3 py-1 bg-purple-600 text-xs tracking-widest rounded-full mb-3">${mode}</span>
                        <h3 class="text-xl font-bold text-white leading-tight">${title}</h3>
                    </div>
                    <div class="text-right">
                        <div class="text-emerald-400 text-sm">PRIZE</div>
                        <div class="text-2xl font-bold text-emerald-400">$${prize}</div>
                    </div>
                </div>
                
                <div class="bg-black/60 border border-cyan-400/30 rounded-lg p-4 mb-6">
                    <div class="flex items-center justify-between text-sm mb-2">
                        <span class="text-purple-300">STARTS IN</span>
                        <span id="countdown-${Math.random().toString(36).slice(2)}" class="countdown text-3xl font-mono text-cyan-400"></span>
                    </div>
                </div>
                
                <div class="text-xs text-purple-400/70 flex items-center gap-2">
                    <i class="fa-solid fa-calendar"></i>
                    <span>${new Date(startTime).toLocaleDateString('en-US', {month:'short', day:'numeric', hour:'numeric'})}</span>
                </div>
            `;
            
            // Live countdown update
            const countdownEl = card.querySelector('[id^="countdown-"]');
            if (countdownEl) {
                const updateCD = () => {
                    countdownEl.textContent = formatCountdown(startTime);
                };
                updateCD();
                setInterval(updateCD, 60000);
            }
            
            return card;
        }
        
        async function renderEvents() {
            const container = document.getElementById('events-container');
            const loading = document.getElementById('loading');
            
            const data = await fetchEvents();
            loading.classList.add('hidden');
            
            if (!data) return;
            
            // Handle different possible response structures
            let events = [];
            
            if (Array.isArray(data)) {
                events = data;
            } else if (data.events) {
                events = Array.isArray(data.events) ? data.events : Object.values(data.events);
            } else if (data.data) {
                events = Array.isArray(data.data) ? data.data : [data.data];
            }
            
            container.innerHTML = '';
            
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-20 text-purple-300">
                        <i class="fa-solid fa-trophy text-6xl mb-6 opacity-50"></i>
                        <p class="text-2xl">No upcoming tournaments found</p>
                    </div>
                `;
                return;
            }
            
            events.slice(0, 12).forEach(event => {
                container.appendChild(createEventCard(event));
            });
        }
        
        // Initialize
        window.onload = () => {
            renderEvents();
            
            // Auto refresh every 5 minutes
            setInterval(() => {
                renderEvents();
            }, 300000);
        };
    </script>
</body>
</html>
