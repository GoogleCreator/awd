<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop IQ • Fortnite Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .shop-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); }
        
        .nav-tab {
            transition: all 0.3s ease;
        }
        .nav-tab-active {
            background-color: #22d3ee;
            color: black;
            font-weight: 700;
        }
        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-8px); }

        /* Leaflet Map Styling */
        #fortnite-map {
            height: 620px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .leaflet-popup-content-wrapper {
            background: #18181b;
            color: white;
            border-radius: 12px;
        }
    </style>
</head>
<body class="shop-bg text-white min-h-screen">

<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Header -->
    <header class="flex items-center justify-between pb-8 border-b border-white/10">
        <div>
            <h1 class="text-5xl font-bold tracking-tighter">DROP IQ</h1>
            <p class="text-cyan-400 text-sm">Fortnite Intelligence • Real-Time</p>
        </div>
        
        <div class="flex items-center gap-3 text-sm">
            <div onclick="switchMainTab(0)" id="tab-shop-btn"
                 class="nav-tab nav-tab-active cursor-pointer px-8 py-3 rounded-3xl flex items-center gap-2">
                <i class="fas fa-store"></i>
                <span>SHOP</span>
            </div>
            <div onclick="switchMainTab(1)" id="tab-map-btn"
                 class="nav-tab cursor-pointer px-8 py-3 rounded-3xl flex items-center gap-2">
                <i class="fas fa-map"></i>
                <span>MAP</span>
            </div>
        </div>
    </header>

    <!-- SHOP SECTION -->
    <div id="shop-section">
        <div class="flex items-center justify-between my-8">
            <h2 class="text-4xl font-bold">Item Shop</h2>
            <button onclick="refreshShop()" 
                    class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-6 py-3 rounded-2xl">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>

        <div id="loading" class="hidden flex flex-col items-center justify-center py-32">
            <div class="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-6"></div>
            <p class="text-xl">Loading live shop data...</p>
        </div>

        <div id="shop-content" class="hidden">
            <div id="featured" class="mb-16"></div>
            <div id="items-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-6"></div>
        </div>
    </div>

    <!-- MAP SECTION -->
    <div id="map-section" class="hidden">
        <div class="mb-6 flex justify-between items-end">
            <div>
                <h2 class="text-4xl font-bold">Battle Royale Map</h2>
                <p class="text-white/60">Click any location to zoom in • Drag to pan • Scroll to zoom</p>
            </div>
        </div>

        <div class="bg-zinc-950 p-3 rounded-3xl">
            <div id="fortnite-map"></div>
        </div>

        <div class="mt-6 bg-zinc-900/70 border border-white/10 rounded-3xl p-6">
            <h3 class="text-xl font-semibold mb-4 flex items-center gap-2">
                <i class="fas fa-location-dot text-red-400"></i> Named Locations
            </h3>
            <div id="poi-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 max-h-96 overflow-auto"></div>
        </div>
    </div>
</div>

<footer class="text-center text-white/40 text-xs py-12 border-t border-white/10 mt-20">
    Drop IQ • Real-time Fortnite data • Not affiliated with Epic Games
</footer>

<script>
// Tab Switching
function switchMainTab(tab) {
    document.getElementById('shop-section').classList.toggle('hidden', tab !== 0);
    document.getElementById('map-section').classList.toggle('hidden', tab !== 1);

    document.getElementById('tab-shop-btn').classList.toggle('nav-tab-active', tab === 0);
    document.getElementById('tab-map-btn').classList.toggle('nav-tab-active', tab === 1);
}

// ==================== SHOP ====================
let shopData = null;

async function fetchShop() {
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('shop-content').classList.add('hidden');

    try {
        const res = await fetch('https://fortnite-api.com/v2/shop');
        const data = await res.json();
        if (data.status === 200) {
            shopData = data.data;
            renderShop();
        }
    } catch (e) {
        console.error(e);
    } finally {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('shop-content').classList.remove('hidden');
    }
}

function getRarityColor(rarity) {
    const map = { legendary: '#f59e0b', epic: '#c026d3', rare: '#3b82f6', uncommon: '#22c55e', common: '#94a3b8' };
    return map[rarity?.toLowerCase()] || '#64748b';
}

function renderShop() {
    const entries = shopData.entries || [];
    const grid = document.getElementById('items-grid');
    grid.innerHTML = '';

    // Featured
    let featuredHTML = `<h2 class="text-3xl font-bold mb-6 flex items-center gap-3"><i class="fas fa-fire text-orange-500"></i>Featured</h2><div class="grid grid-cols-1 md:grid-cols-4 gap-6">`;
    entries.slice(0, 4).forEach(entry => {
        const item = entry.brItems?.[0] || entry.tracks?.[0] || {};
        const price = entry.finalPrice || entry.regularPrice;
        const name = item.name || 'Item';
        const image = item.images?.featured || item.images?.icon || '';

        featuredHTML += `
            <div class="card bg-zinc-900 rounded-3xl overflow-hidden border border-white/10">
                <img src="${image}" class="w-full h-64 object-cover" alt="${name}">
                <div class="p-4">
                    <h3 class="font-semibold line-clamp-2">${name}</h3>
                    <p class="text-cyan-400 font-bold mt-2">${price} V-Bucks</p>
                </div>
            </div>`;
    });
    featuredHTML += `</div>`;
    document.getElementById('featured').innerHTML = featuredHTML;

    // All Items
    entries.forEach(entry => {
        const item = entry.brItems?.[0] || entry.tracks?.[0] || {};
        const price = entry.finalPrice || entry.regularPrice;
        const name = item.name || 'Item';
        const image = item.images?.icon || 'https://picsum.photos/300';
        const rarity = (item.rarity?.value || 'common').toLowerCase();

        const html = `
            <div class="card bg-zinc-900/80 border border-white/10 rounded-3xl overflow-hidden">
                <img src="${image}" class="w-full aspect-square object-cover">
                <div class="p-4">
                    <h3 class="font-medium line-clamp-2 mb-2">${name}</h3>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-cyan-400">${price}</span>
                        <span class="text-xs uppercase px-3 py-1 rounded-full" style="color:${getRarityColor(rarity)}; background:rgba(255,255,255,0.1)">
                            ${rarity}
                        </span>
                    </div>
                </div>
            </div>`;
        grid.innerHTML += html;
    });
}

// ==================== INTERACTIVE MAP ====================
let map;
let currentMarker = null;

async function loadInteractiveMap() {
    // Initialize Leaflet map
    map = L.map('fortnite-map', {
        zoomControl: true,
        attributionControl: false
    }).setView([0, 0], 2); // Center on map

    // Add Fortnite map image
    L.imageOverlay(
        'https://fortnite-api.com/images/map_en.png',
        [[-256, -256], [256, 256]]  // Bounds for full image
    ).addTo(map);

    try {
        const res = await fetch('https://fortnite-api.com/v1/map');
        const data = await res.json();
        
        if (data.status === 200) {
            const pois = data.data.pois || [];
            const poiList = document.getElementById('poi-list');
            poiList.innerHTML = '';

            pois.forEach(poi => {
                // Create list item
                const div = document.createElement('div');
                div.className = "bg-zinc-800 hover:bg-zinc-700 p-4 rounded-2xl cursor-pointer transition flex items-center gap-3";
                div.innerHTML = `
                    <i class="fas fa-map-marker-alt text-red-400"></i>
                    <span class="font-medium">${poi.name}</span>
                `;
                
                // Click to zoom on map
                div.onclick = () => {
                    if (poi.location) {
                        const lat = poi.location.y || 0;
                        const lng = poi.location.x || 0;
                        map.flyTo([lat, lng], 5, { duration: 1.5 });
                    } else {
                        // Fallback - zoom to center if no coords
                        map.flyTo([0, 0], 4);
                    }
                };
                
                poiList.appendChild(div);
            });
        }
    } catch (e) {
        console.error("Failed to load POIs", e);
    }
}

async function refreshShop() {
    await fetchShop();
}

// Initialize everything
window.onload = () => {
    fetchShop();
    loadInteractiveMap();
};
</script>
</body>
</html>
