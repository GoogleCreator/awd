<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DropIQ • Fortnite Tournaments</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap');
    
    :root {
      --blue: #00b4ff;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1c 0%, #001122 100%);
      color: #e0f0ff;
      min-height: 100vh;
    }
    .header-font {
      font-family: 'Press Start 2P', cursive;
    }
    .card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 0 30px rgba(0, 180, 255, 0.5);
    }
    .live-dot {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .tournament-img {
      filter: brightness(0.85) contrast(1.1);
    }
  </style>
</head>
<body class="bg-[#0a0f1c]">

  <!-- Navbar -->
  <nav class="border-b border-cyan-500/30 bg-black/70 backdrop-blur-xl fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center text-2xl">🎮</div>
        <h1 class="text-3xl font-bold header-font tracking-widest text-cyan-400">DROPIQ</h1>
      </div>
      <div class="flex gap-8 text-lg">
        <a href="#" class="hover:text-cyan-400 transition">Live</a>
        <a href="#" class="hover:text-cyan-400 transition">Upcoming</a>
        <a href="#" class="hover:text-cyan-400 transition">Past</a>
        <a href="#" class="hover:text-cyan-400 transition">Leaderboards</a>
      </div>
      <div class="flex items-center gap-4">
        <div class="px-4 py-2 bg-cyan-500/10 border border-cyan-500 rounded-full text-sm flex items-center gap-2">
          <div class="w-3 h-3 bg-green-400 rounded-full live-dot"></div>
          <span>Connected</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="pt-28 pb-12 max-w-7xl mx-auto px-6">
    <div class="text-center mb-12">
      <h2 class="text-6xl font-bold header-font tracking-widest text-cyan-300 mb-4">FORTNITE TOURNAMENTS</h2>
      <p class="text-xl text-cyan-100/70">Real-time drops • Competitive intelligence</p>
    </div>

    <!-- Status Tabs -->
    <div class="flex gap-2 mb-10 justify-center">
      <button onclick="filterCategory('all')" class="active-tab px-8 py-3 rounded-2xl font-medium bg-cyan-500 text-black">ALL</button>
      <button onclick="filterCategory('live')" class="px-8 py-3 rounded-2xl font-medium hover:bg-cyan-500/20 transition">LIVE NOW</button>
      <button onclick="filterCategory('upcoming')" class="px-8 py-3 rounded-2xl font-medium hover:bg-cyan-500/20 transition">UPCOMING</button>
    </div>

    <!-- Tournaments Grid -->
    <div id="tournaments-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Populated by JavaScript -->
    </div>
  </div>

  <footer class="border-t border-cyan-500/20 py-8 text-center text-cyan-400/50 text-sm">
    DropIQ • Powered by api-fortnite.com • Not affiliated with Epic Games
  </footer>

  <script>
    const API_KEY = "6a80995122955fa8e116ef2b683076a273eae9ea3fd9cf85581a727745951b0c";
    const BASE_URL = "https://prod.api-fortnite.com";

    // Mock data (replace with real API once we find the right endpoint)
    let tournaments = [
      {
        id: 1,
        title: "FNCS Division 1",
        status: "live",
        time: "LIVE • Ends in 1h 42m",
        image: "https://picsum.photos/id/1015/800/450",
        prize: "$50,000",
        mode: "Battle Royale • Duos",
        region: "NA Central"
      },
      {
        id: 2,
        title: "Reload Elite Series",
        status: "upcoming",
        time: "Tomorrow • 7:00 PM",
        image: "https://picsum.photos/id/237/800/450",
        prize: "$15,000",
        mode: "Reload • Squads",
        region: "Europe"
      },
      {
        id: 3,
        title: "Zero Build Ranked Cup",
        status: "upcoming",
        time: "May 16 • 6:00 PM",
        image: "https://picsum.photos/id/180/800/450",
        prize: "$8,000",
        mode: "Zero Build • Solos",
        region: "NA East"
      },
      {
        id: 4,
        title: "Mobile Series Qualifiers",
        status: "upcoming",
        time: "May 14 • 8:00 PM",
        image: "https://picsum.photos/id/201/800/450",
        prize: "Qualification",
        mode: "Battle Royale • Solos",
        region: "Global"
      }
    ];

    function createCard(t) {
      const statusColor = t.status === 'live' ? 'bg-red-500' : 'bg-cyan-500';
      const statusText = t.status === 'live' ? 'LIVE' : 'UPCOMING';

      return `
        <div class="card bg-zinc-950 border border-cyan-500/30 rounded-3xl overflow-hidden">
          <div class="relative">
            <img src="${t.image}" class="w-full h-48 object-cover tournament-img" alt="${t.title}">
            <div class="absolute top-4 right-4 px-4 py-1 ${statusColor} text-black text-xs font-bold rounded-full flex items-center gap-1.5">
              <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-white"></span>
              </span>
              ${statusText}
            </div>
          </div>
          <div class="p-6">
            <h3 class="text-2xl font-bold mb-2">${t.title}</h3>
            <p class="text-cyan-300 mb-4">${t.mode} • ${t.region}</p>
            
            <div class="flex justify-between items-center text-sm mb-5">
              <div>
                <span class="text-cyan-400">Prize Pool</span><br>
                <span class="font-bold text-lg">${t.prize}</span>
              </div>
              <div class="text-right">
                <span class="text-cyan-400">Starts</span><br>
                <span class="font-medium">${t.time}</span>
              </div>
            </div>

            <button onclick="joinTournament(${t.id})" 
                    class="w-full py-4 rounded-2xl bg-gradient-to-r from-cyan-400 to-blue-500 text-black font-bold text-lg hover:brightness-110 transition">
              ${t.status === 'live' ? 'SPECTATE NOW' : 'REGISTER / VIEW'}
            </button>
          </div>
        </div>
      `;
    }

    function renderTournaments(filtered) {
      const container = document.getElementById('tournaments-grid');
      container.innerHTML = filtered.map(t => createCard(t)).join('');
    }

    function filterCategory(category) {
      document.querySelectorAll('button').forEach(b => b.classList.remove('active-tab', 'bg-cyan-500', 'text-black'));
      
      if (category === 'all') {
        renderTournaments(tournaments);
      } else {
        const filtered = tournaments.filter(t => t.status === category);
        renderTournaments(filtered);
      }
    }

    function joinTournament(id) {
      alert(`Opening tournament details for ID: ${id} (Demo)`);
    }

    // Initial render
    renderTournaments(tournaments);

    // Try fetching real data (you can expand this later)
    async function fetchRealTournaments() {
      try {
        // Example: if there's a list endpoint
        const res = await fetch(`${BASE_URL}/api/v2/events`, {
          headers: { "x-api-key": API_KEY }
        });
        console.log("API Response:", await res.text());
      } catch(e) {
        console.log("Using demo data (no public list endpoint found yet)");
      }
    }

    fetchRealTournaments();
  </script>
</body>
</html>
