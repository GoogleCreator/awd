<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DropIQ — Fortnite Tournaments</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --b50: #dbeeff;
    --b100: #b3d9ff;
    --b200: #7abfff;
    --b300: #3a9eff;
    --b400: #0d7ff0;
    --b500: #0062c8;
    --b600: #0048a0;
    --b700: #003278;
    --b800: #001d50;
    --b900: #000e2e;
    --glow: rgba(13, 127, 240, 0.55);
    --glow-soft: rgba(58, 158, 255, 0.25);
    --text-bright: #e8f4ff;
    --text-mid: #8ec8ff;
    --text-dim: #4a84b8;
    --card-bg: rgba(0, 18, 48, 0.82);
    --card-border: rgba(58, 158, 255, 0.22);
    --card-border-hover: rgba(58, 158, 255, 0.6);
    --live-green: #00e676;
    --upcoming-amber: #ffc107;
    --ended-gray: #546e8a;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Exo 2', sans-serif;
    background: #000b1e;
    color: var(--text-bright);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% -10%, rgba(0, 98, 200, 0.35) 0%, transparent 65%),
      radial-gradient(ellipse 60% 50% at 85% 30%, rgba(13, 127, 240, 0.2) 0%, transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 100%, rgba(0, 30, 80, 0.7) 0%, transparent 70%);
  }
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(58, 158, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(58, 158, 255, 0.05) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridScroll 20s linear infinite;
  }
  @keyframes gridScroll {
    0% { background-position: 0 0; }
    100% { background-position: 48px 48px; }
  }
  .particle-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--b300);
    border-radius: 50%;
    opacity: 0;
    animation: particleFloat var(--dur, 8s) var(--delay, 0s) infinite ease-in-out;
  }
  @keyframes particleFloat {
    0% { transform: translate(0, 0) scale(0); opacity: 0; }
    20% { opacity: 0.8; }
    80% { opacity: 0.4; }
    100% { transform: translate(var(--dx, 30px), var(--dy, -180px)) scale(0); opacity: 0; }
  }
  .page-wrap {
    position: relative;
    z-index: 1;
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .hero {
    padding: 120px 0 60px;
    text-align: center;
    animation: fadeUp 0.8s 0.2s ease both;
  }
  @keyframes fadeUp {
    from { transform: translateY(32px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--b300);
    background: rgba(58, 158, 255, 0.1);
    border: 1px solid rgba(58, 158, 255, 0.25);
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 28px;
  }
  .eyebrow-dot {
    width: 6px; height: 6px;
    background: var(--b300);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
  }
  .hero h1 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(40px, 7vw, 82px);
    line-height: 0.95;
    letter-spacing: -1px;
    margin-bottom: 24px;
  }
  .hero h1 .line1 { display: block; color: var(--text-bright); }
  .hero h1 .line2 {
    display: block;
    background: linear-gradient(135deg, var(--b300) 0%, #60c8ff 50%, var(--b200) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 24px rgba(58, 158, 255, 0.5));
  }
  .hero-sub {
    font-size: 18px;
    font-weight: 300;
    color: var(--text-dim);
    max-width: 520px;
    margin: 0 auto 48px;
    line-height: 1.6;
  }
  .hero-sub strong { color: var(--text-mid); font-weight: 600; }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
  }
  .stat-item {
    text-align: center;
    animation: fadeUp 0.8s ease both;
  }
  .stat-item:nth-child(1) { animation-delay: 0.4s; }
  .stat-item:nth-child(2) { animation-delay: 0.5s; }
  .stat-item:nth-child(3) { animation-delay: 0.6s; }
  .stat-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--b300);
    display: block;
    text-shadow: 0 0 16px var(--glow);
  }
  .stat-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    animation: fadeUp 0.8s 0.5s ease both;
  }
  .filter-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .filter-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-pill {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid rgba(58, 158, 255, 0.25);
    background: transparent;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Exo 2', sans-serif;
  }
  .filter-pill:hover {
    border-color: var(--b300);
    color: var(--text-bright);
    background: rgba(58, 158, 255, 0.1);
  }
  .filter-pill.active {
    background: var(--b400);
    border-color: var(--b400);
    color: #fff;
    box-shadow: 0 0 16px var(--glow);
  }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    animation: fadeUp 0.7s ease both;
  }
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-bright);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-accent {
    display: inline-block;
    width: 4px;
    height: 22px;
    background: linear-gradient(180deg, var(--b300), var(--b500));
    border-radius: 2px;
    box-shadow: 0 0 8px var(--glow);
  }
  .section-count {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
    letter-spacing: 1px;
  }
  .live-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0, 230, 118, 0.07);
    border: 1px solid rgba(0, 230, 118, 0.25);
    border-radius: 10px;
    padding: 12px 20px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .live-indicator {
    width: 10px; height: 10px;
    background: var(--live-green);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px var(--live-green);
    animation: livePulse 1.2s infinite;
  }
  @keyframes livePulse {
    0%, 100% { box-shadow: 0 0 6px var(--live-green); }
    50% { box-shadow: 0 0 16px var(--live-green), 0 0 28px rgba(0,230,118,0.4); }
  }
  .live-banner-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--live-green);
    letter-spacing: 1px;
  }
  .live-banner-sub {
    font-size: 12px;
    color: rgba(0, 230, 118, 0.6);
    margin-left: auto;
    letter-spacing: 0.5px;
  }
  .tournaments-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 60px;
  }
  .t-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    animation: cardReveal 0.6s ease both;
    backdrop-filter: blur(12px);
    position: relative;
  }
  .t-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--b300), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .t-card:hover {
    transform: translateY(-4px);
    border-color: var(--card-border-hover);
    box-shadow: 0 12px 40px rgba(13, 127, 240, 0.25), 0 0 0 1px rgba(58, 158, 255, 0.1);
  }
  .t-card:hover::before { opacity: 1; }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .t-card-img-wrap {
    position: relative;
    width: 100%;
    height: 180px;
    overflow: hidden;
    background: linear-gradient(135deg, #001233, #002060);
  }
  .t-card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s, filter 0.3s;
    filter: brightness(0.85) saturate(1.1);
  }
  .t-card:hover .t-card-img {
    transform: scale(1.06);
    filter: brightness(1) saturate(1.3);
  }
  .t-card-img-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: rgba(58, 158, 255, 0.3);
    letter-spacing: 3px;
    background: linear-gradient(135deg, #000e2e 0%, #001a50 50%, #000e2e 100%);
    user-select: none;
  }
  .t-card-img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,11,30,0.9) 0%, transparent 60%);
  }
  .t-status-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
  }
  .t-status-badge.live {
    background: rgba(0, 230, 118, 0.2);
    border: 1px solid rgba(0, 230, 118, 0.5);
    color: var(--live-green);
    box-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
    animation: badgeGlow 1.5s infinite alternate;
  }
  @keyframes badgeGlow {
    from { box-shadow: 0 0 6px rgba(0,230,118,0.3); }
    to { box-shadow: 0 0 14px rgba(0,230,118,0.6), 0 0 24px rgba(0,230,118,0.2); }
  }
  .t-status-badge.upcoming {
    background: rgba(255, 193, 7, 0.15);
    border: 1px solid rgba(255, 193, 7, 0.4);
    color: var(--upcoming-amber);
  }
  .t-status-badge.ended {
    background: rgba(84, 110, 138, 0.2);
    border: 1px solid rgba(84, 110, 138, 0.35);
    color: var(--ended-gray);
  }
  .t-card-body {
    padding: 16px 18px 18px;
  }
  .t-card-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
    line-height: 1.25;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .t-card-region {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--b300);
    margin-bottom: 14px;
  }
  .t-card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .t-meta-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-mid);
    background: rgba(58, 158, 255, 0.08);
    border: 1px solid rgba(58, 158, 255, 0.15);
    border-radius: 6px;
    padding: 4px 10px;
  }
  .t-card-prize {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--b300);
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    text-shadow: 0 0 12px rgba(58, 158, 255, 0.4);
  }
  .t-card-prize-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .t-card-footer {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(58, 158, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .t-card-windows {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .t-card-windows strong { color: var(--text-mid); }
  .t-card-arrow {
    width: 28px; height: 28px;
    background: rgba(58, 158, 255, 0.1);
    border: 1px solid rgba(58, 158, 255, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
  }
  .t-card:hover .t-card-arrow {
    background: var(--b400);
    border-color: var(--b400);
    box-shadow: 0 0 10px var(--glow);
    transform: translateX(2px);
  }
  .loader-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 260px;
    gap: 20px;
    animation: fadeUp 0.5s ease;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(58, 158, 255, 0.15);
    border-top-color: var(--b300);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
  }
  .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  footer {
    margin-top: 40px;
    padding: 32px 0;
    border-top: 1px solid rgba(58, 158, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .footer-brand {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .footer-brand span { color: var(--b300); }
  .footer-copy {
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0.6;
  }
  .section-wrap {
    margin-bottom: 48px;
    animation: fadeUp 0.7s ease both;
  }
  .t-countdown {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .t-countdown-seg {
    text-align: center;
    background: rgba(58, 158, 255, 0.1);
    border: 1px solid rgba(58, 158, 255, 0.2);
    border-radius: 5px;
    padding: 3px 7px;
    min-width: 36px;
  }
  .t-countdown-val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--b300);
    display: block;
    line-height: 1;
    margin-bottom: 2px;
  }
  .t-countdown-unit {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
</style>
</head>
<body>
<div class="bg-layer">
  <div class="grid-overlay"></div>
  <div class="particle-container" id="particles"></div>
</div>

<main>
  <div class="page-wrap">
    <section class="hero">
      <div class="hero-eyebrow">
        <span class="eyebrow-dot"></span>
        Fortnite Competitive Hub
      </div>
      <h1>
        <span class="line1">Welcome to</span>
        <span class="line2">DropIQ</span>
      </h1>
      <p class="hero-sub">Your <strong>real-time</strong> command center for every Fortnite tournament — live, upcoming, and completed events worldwide.</p>
      <div class="stats-row" id="heroStats">
        <div class="stat-item">
          <span class="stat-num" id="stat-total">—</span>
          <div class="stat-label">Total Events</div>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="stat-live">—</span>
          <div class="stat-label">Live Now</div>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="stat-upcoming">—</span>
          <div class="stat-label">Upcoming</div>
        </div>
      </div>
    </section>

    <div id="tournaments">
      <div class="filter-bar">
        <span class="filter-label">Filter:</span>
        <div class="filter-pills">
          <button class="filter-pill active" data-filter="all" onclick="setFilter('all', this)">All Events</button>
          <button class="filter-pill" data-filter="live" onclick="setFilter('live', this)">🟢 Live</button>
          <button class="filter-pill" data-filter="upcoming" onclick="setFilter('upcoming', this)">🕐 Upcoming</button>
          <button class="filter-pill" data-filter="ended" onclick="setFilter('ended', this)">✓ Ended</button>
        </div>
      </div>

      <div id="content-area">
        <div class="loader-wrap">
          <div class="spinner"></div>
          <div class="loader-text">Loading tournaments...</div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="page-wrap">
  <footer>
    <div class="footer-brand">Drop<span>IQ</span></div>
    <div class="footer-copy">Powered by Fortnite API · Live tournament data</div>
  </footer>
</div>

<script>
const API_KEY = '6a80995122955fa8e116ef2b683076a273eae9ea3fd9cf85581a727745951b0c';
const BASE = 'https://prod.api-fortnite.com';
let allEvents = [];
let currentFilter = 'all';
let countdownIntervals = [];

(function() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left: ${Math.random()*100}%; top: ${Math.random()*100}%; --dur: ${6+Math.random()*10}s; --delay: ${Math.random()*8}s; --dx: ${(Math.random()-0.5)*80}px; --dy: ${-(80+Math.random()*200)}px; width: ${1+Math.random()*2}px; height: ${1+Math.random()*2}px;`;
    c.appendChild(p);
  }
})();

function getStatus(ev) {
  const now = Date.now();
  const windows = ev.eventWindows || ev.windows || [];
  if (windows.length > 0) {
    let hasLive = false;
    let hasFuture = false;
    for (const w of windows) {
      const start = new Date(w.beginTime || w.startTime || 0).getTime();
      const end = new Date(w.endTime || 0).getTime();
      if (now >= start && (end === 0 || now <= end)) hasLive = true;
      if (now < start) hasFuture = true;
    }
    if (hasLive) return 'live';
    if (hasFuture) return 'upcoming';
    return 'ended';
  }
  const startTime = ev.beginTime || ev.startTime;
  const endTime = ev.endTime;
  if (startTime) {
    const start = new Date(startTime).getTime();
    const end = endTime ? new Date(endTime).getTime() : Infinity;
    if (now >= start && now <= end) return 'live';
    if (now < start) return 'upcoming';
  }
  return 'ended';
}

function getNextWindow(ev) {
  const now = Date.now();
  const windows = ev.eventWindows || ev.windows || [];
  const future = windows
    .map(w => ({ ...w, ts: new Date(w.beginTime || w.startTime || 0).getTime() }))
    .filter(w => w.ts > now)
    .sort((a,b) => a.ts - b.ts);
  return future[0] || null;
}

function formatDate(str) {
  if (!str) return '—';
  try {
    const d = new Date(str);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch(e) { return str; }
}

function formatTime(str) {
  if (!str) return '';
  try {
    const d = new Date(str);
    return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
  } catch(e) { return ''; }
}

function formatPrize(val) {
  if (!val && val !== 0) return null;
  if (typeof val === 'string' && val.includes('$')) return val;
  if (typeof val === 'number') {
    if (val >= 1000000) return '$' + (val/1000000).toFixed(1) + 'M';
    if (val >= 1000) return '$' + (val/1000).toFixed(0) + 'K';
    return '$' + val.toLocaleString();
  }
  return String(val);
}

function countdown(targetTs, cardId) {
  const id = setInterval(() => {
    const el = document.getElementById('cd-' + cardId);
    if (!el) { clearInterval(id); return; }
    const diff = targetTs - Date.now();
    if (diff <= 0) { el.innerHTML = '<span style="color:var(--live-green);font-size:12px;font-weight:700;">STARTING NOW</span>'; clearInterval(id); return; }
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    el.innerHTML = d > 0
      ? `<div class="t-countdown"><div class="t-countdown-seg"><span class="t-countdown-val">${d}</span><span class="t-countdown-unit">D</span></div><div class="t-countdown-seg"><span class="t-countdown-val">${String(h).padStart(2,'0')}</span><span class="t-countdown-unit">H</span></div><div class="t-countdown-seg"><span class="t-countdown-val">${String(m).padStart(2,'0')}</span><span class="t-countdown-unit">M</span></div></div>`
      : `<div class="t-countdown"><div class="t-countdown-seg"><span class="t-countdown-val">${String(h).padStart(2,'0')}</span><span class="t-countdown-unit">H</span></div><div class="t-countdown-seg"><span class="t-countdown-val">${String(m).padStart(2,'0')}</span><span class="t-countdown-unit">M</span></div><div class="t-countdown-seg"><span class="t-countdown-val">${String(s).padStart(2,'0')}</span><span class="t-countdown-unit">S</span></div></div>`;
  }, 1000);
  countdownIntervals.push(id);
}

function getEventImage(ev) {
  const candidates = [ev.poster_front_image, ev.posterFrontImage, ev.poster_back_image, ev.posterBackImage, ev.image, ev.thumbnail, ev.logo, ev.poster, ev.banner];
  for (const c of candidates) {
    if (c && typeof c === 'string' && c.startsWith('http')) return c;
  }
  return null;
}

function buildCard(ev, index) {
  const status = getStatus(ev);
  const img = getEventImage(ev);
  const prize = formatPrize(ev.prizePool || ev.prize_pool || ev.totalPrize || ev.rewards?.total);
  const nextWin = getNextWindow(ev);
  const windows = ev.eventWindows || ev.windows || [];
  const title = ev.displayName || ev.name || ev.title || 'Unnamed Tournament';
  const region = (ev.region || ev.regionDisplayName || 'Global').toUpperCase();
  const cardId = 'ev-' + (ev.id || ev.eventId || index);
  const statusLabel = status === 'live' ? '🔴 LIVE' : status === 'upcoming' ? 'UPCOMING' : 'ENDED';
  let countdownHTML = '';
  if (status === 'upcoming' && nextWin) {
    const ts = new Date(nextWin.beginTime || nextWin.startTime || 0).getTime();
    countdownHTML = `<div id="cd-${cardId}" style="margin-top:10px;"></div>`;
  }
  let dateDisplay = '';
  if (ev.beginTime || ev.startTime) {
    const d = formatDate(ev.beginTime || ev.startTime);
    const t = formatTime(ev.beginTime || ev.startTime);
    dateDisplay = d + (t ? ' · ' + t : '');
  } else if (windows.length > 0 && (windows[0].beginTime || windows[0].startTime)) {
    dateDisplay = formatDate(windows[0].beginTime || windows[0].startTime);
  }
  return `
<article class="t-card" style="animation-delay:${index * 0.06}s" data-status="${status}" data-id="${cardId}">
  <div class="t-card-img-wrap">
    ${img ? `<img class="t-card-img" src="${img}" alt="${title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" /><div class="t-card-img-fallback" style="display:none">FORTNITE</div>` : `<div class="t-card-img-fallback">FORTNITE</div>`}
    <div class="t-card-img-overlay"></div>
    <span class="t-status-badge ${status}">${statusLabel}</span>
  </div>
  <div class="t-card-body">
    <div class="t-card-title">${title}</div>
    ${region ? `<div class="t-card-region">${region}</div>` : ''}
    <div class="t-card-meta">
      ${dateDisplay ? `<span class="t-meta-chip"><svg width="11" height="11" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 1v3M11 1v3M2 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>${dateDisplay}</span>` : ''}
      ${windows.length > 0 ? `<span class="t-meta-chip"><svg width="11" height="11" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3.5L10.5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>${windows.length} Window${windows.length>1?'s':''}</span>` : ''}
    </div>
    ${prize ? `<div class="t-card-prize">${prize}</div><div class="t-card-prize-label">Prize Pool</div>` : ''}
    ${countdownHTML}
    <div class="t-card-footer">
      <div class="t-card-windows">
        ${status === 'live' ? '<span style="color:var(--live-green);">● In Progress</span>' : ''}
        ${status === 'ended' ? `<strong>${windows.length}</strong> rounds completed` : ''}
        ${status === 'upcoming' && nextWin ? `Starts <strong>${formatDate(nextWin.beginTime||nextWin.startTime)}</strong>` : ''}
      </div>
      <div class="t-card-arrow">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>
</article>`;
}

function renderSection(title, events, sectionId, showLiveBanner) {
  if (events.length === 0) return '';
  const cards = events.map((ev, i) => buildCard(ev, i)).join('');
  const liveBar = showLiveBanner && events.length > 0 ? `
    <div class="live-banner">
      <div class="live-indicator"></div>
      <span class="live-banner-text">Live Tournaments Active</span>
      <span class="live-banner-sub">${events.length} event${events.length>1?'s':''} in progress</span>
    </div>` : '';
  return `
    ${liveBar}
    <div class="section-wrap">
      <div class="section-head">
        <div class="section-title">
          <span class="section-accent"></span>
          ${title}
        </div>
        <span class="section-count">${events.length} event${events.length>1?'s':''}</span>
      </div>
      <div class="tournaments-grid">${cards}</div>
    </div>`;
}

function renderAll(filter) {
  countdownIntervals.forEach(id => clearInterval(id));
  countdownIntervals = [];
  let toShow = allEvents;
  if (filter !== 'all') toShow = allEvents.filter(ev => getStatus(ev) === filter);
  const live = toShow.filter(ev => getStatus(ev) === 'live');
  const upcoming = toShow.filter(ev => getStatus(ev) === 'upcoming');
  const ended = toShow.filter(ev => getStatus(ev) === 'ended');
  let html = '';
  if (filter === 'all' || filter === 'live') html += renderSection('Live Now', live, 'live', true);
  if (filter === 'all' || filter === 'upcoming') html += renderSection('Upcoming Events', upcoming, 'upcoming', false);
  if (filter === 'all' || filter === 'ended') html += renderSection('Recent & Completed', ended, 'ended', false);
  if (!html) {
    html = `<div class="empty-state"><div class="empty-icon">🎯</div><p style="font-size:16px;color:var(--text-mid);font-weight:600;">No ${filter} events found</p></div>`;
  }
  document.getElementById('content-area').innerHTML = html;
  allEvents.filter(ev => getStatus(ev) === 'upcoming').forEach((ev, i) => {
    const cardId = 'ev-' + (ev.id || ev.eventId || i);
    const nextWin = getNextWindow(ev);
    if (nextWin) {
      const ts = new Date(nextWin.beginTime || nextWin.startTime || 0).getTime();
      if (ts > Date.now()) countdown(ts, cardId);
    }
  });
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderAll(filter);
}

function animateStat(id, target) {
  const el = document.getElementById(id);
  if (!el) return;
  let cur = 0;
  const step = Math.ceil(target / 30);
  const iv = setInterval(() => {
    cur = Math.min(cur + step, target);
    el.textContent = cur;
    if (cur >= target) clearInterval(iv);
  }, 40);
}

function showDemoData() {
  const now = Date.now();
  allEvents = [
    {id: 'demo1', displayName: 'FNCS Global Championship 2025', region: 'Global', prizePool: 2000000, beginTime: new Date(now - 3600000).toISOString(), endTime: new Date(now + 7200000).toISOString(), eventWindows: [{beginTime: new Date(now - 3600000).toISOString(), endTime: new Date(now + 7200000).toISOString()}]},
    {id: 'demo2', displayName: 'Solo Cash Cup — NA East', region: 'NAE', prizePool: 50000, beginTime: new Date(now + 86400000).toISOString(), eventWindows: [{beginTime: new Date(now + 86400000).toISOString()}]},
    {id: 'demo3', displayName: 'Ranked Open Tournament — EU', region: 'EU', prizePool: 25000, beginTime: new Date(now + 3*86400000).toISOString(), eventWindows: [{beginTime: new Date(now + 3*86400000).toISOString()}]},
    {id: 'demo4', displayName: 'Duos Invitational — BR', region: 'Brazil', prizePool: 10000, beginTime: new Date(now + 2*86400000).toISOString(), eventWindows: [{beginTime: new Date(now + 2*86400000).toISOString()}]},
    {id: 'demo5', displayName: 'Zero Build Cup — NAW', region: 'NAW', prizePool: 15000, beginTime: new Date(now + 86400000*1.5).toISOString(), eventWindows: [{beginTime: new Date(now + 86400000*1.5).toISOString()}]}
  ];
  animateStat('stat-total', allEvents.length);
  animateStat('stat-live', allEvents.filter(ev => getStatus(ev) === 'live').length);
  animateStat('stat-upcoming', allEvents.filter(ev => getStatus(ev) === 'upcoming').length);
  renderAll('all');
}

async function fetchTournaments() {
  document.getElementById('content-area').innerHTML = `<div class="loader-wrap"><div class="spinner"></div><div class="loader-text">Fetching live tournament data...</div></div>`;
  const endpoints = ['/api/v1/events/global', '/api/v1/events/global/history', '/api/v1/events/tracker', '/api/v1/events/cashprizes'];
  let merged = [];
  for (const ep of endpoints) {
    try {
      const res = await fetch(BASE + ep, {
        headers: { 'x-api-key': API_KEY, 'Accept': 'application/json' }
      });
      if (res.ok) {
        const json = await res.json();
        const arr = json.data || json.events || json.tournaments || json.items || json.results || (Array.isArray(json) ? json : []);
        if (arr.length > 0) merged.push(...arr);
      }
    } catch(e) {}
  }
  if (merged.length > 0) {
    const seen = new Set();
    allEvents = merged.filter(ev => {
      const key = ev.id || ev.eventId || JSON.stringify(ev).slice(0,100);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    animateStat('stat-total', allEvents.length);
    animateStat('stat-live', allEvents.filter(ev => getStatus(ev) === 'live').length);
    animateStat('stat-upcoming', allEvents.filter(ev => getStatus(ev) === 'upcoming').length);
    renderAll('all');
  } else {
    showDemoData();
  }
}

fetchTournaments();
</script>
